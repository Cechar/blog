name: "text-analyzer"
version: "1.0.0"
description: "分析文本内容，提取关键信息，支持情感分析、关键词提取等功能"
author: "My Blog"
tags:
  - text
  - analysis
  - nlp

config:
  timeout: 60
  retries: 3

parameters:
  - name: "text"
    type: "string"
    required: true
    description: "需要分析的文本"
  - name: "analysis_type"
    type: "string"
    required: false
    default: "general"
    description: "分析类型: general, sentiment, keywords"

logic:
  type: "prompt"
  content: "请对以下文本进行{{analysis_type}}分析：\n\n{{text}}\n\n分析结果："

tools:
  - name: "search"
    description: "搜索相关信息"
    parameters:
      query: "{{text}} 分析"

workflow:
  steps:
    - name: "analyze"
      action: "prompt"
      next: "enhance"
    - name: "enhance"
      action: "tool"
      tool: "search"
      next: "output"
    - name: "output"
      action: "combine"
      inputs:
        - "analyze"
        - "enhance"
